name: 'localbike'
version: '1.0.0'
config-version: 2

# Connection profile. Locally this resolves to ./profiles.yml (run with
# `--profiles-dir .`); on dbt Cloud the profile is managed by the platform.
profile: 'localbike'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layered architecture (see CLAUDE.md). Staging mirrors the source 1:1 as views,
# intermediate is ephemeral (compiled inline), marts are persisted tables that
# the dashboards read.
models:
  localbike:
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table

seeds:
  localbike:
    +schema: seed
